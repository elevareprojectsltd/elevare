name: Deploy to cPanel

# Force GitHub Actions to use Node.js 24
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - main  # or master if you use that branch

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20 # or change to 24 if you prefer

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build

      - name: Deploy to cPanel
        uses: some-cpanel-deploy-action@vX  # replace with your cPanel deploy action
        with:
          # your cPanel credentials and paths